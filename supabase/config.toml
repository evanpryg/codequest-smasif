# Konfigurasi Supabase CLI untuk CodeQuest.
# Docs: https://supabase.com/docs/guides/cli/config
project_id = "codequest"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
# URL situs untuk redirect (sesuaikan saat deploy frontend).
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Edge Function: login siswa (Kelas -> Nama -> Password).
# verify_jwt = false karena siswa BELUM punya sesi saat memanggil endpoint ini.
[functions.student-login]
verify_jwt = false
